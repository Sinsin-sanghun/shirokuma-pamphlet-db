const CATEGORY_ICONS = {
  'BESS茫聝禄猫聯聞茅聸禄忙卤聽': '冒聼聰聥', 'PCS茫聝禄茫聝聭茫聝炉茫聜鲁茫聝鲁': '芒職隆', '氓陇陋茅聶陆氓聟聣莽聶潞茅聸禄': '芒聵聙茂赂聫', '茅垄篓氓聤聸莽聶潞茅聸禄': '冒聼聦聙',
  '忙麓聥盲赂聤茅垄篓氓聤聸茫聝禄忙碌路盲潞聥': '冒聼職垄', '氓聫聴氓陇聣茅聸禄猫篓颅氓聜聶茫聝禄茅聸禄忙掳聴忙漏聼氓聶篓': '冒聼聰聦', 'EMS茫聝禄莽聸拢猫娄聳氓聢露氓戮隆': '冒聼聯聤',
  '忙聤聙猫隆聯氓聧聰猫颅掳忙聸赂茫聝禄盲禄聲忙搂聵忙聸赂': '冒聼聯聥', '猫陋聧猫篓录茫聝禄猫漏娄茅篓聯茫聝卢茫聝聺茫聝录茫聝聢': '芒聹聟', '茅聸禄忙掳聴氓聸鲁茅聺垄茫聝禄SLD': '冒聼聯聬',
  '茅聝篓氓聯聛氓聸鲁茅聺垄茫聝禄氓聻聥莽聲陋猫鲁聡忙聳聶': '冒聼聰漏', '茅篓聮茅聼鲁茫聝卢茫聝聺茫聝录茫聝聢': '冒聼聰聤', '氓庐聣氓聟篓茫聝禄忙露聢茅聵虏': '冒聼搂炉',
  'O&M茫聝禄茫聝隆茫聝鲁茫聝聠茫聝聤茫聝鲁茫聜鹿': '冒聼聰搂', '氓卤聲莽陇潞盲录職茫聝禄EXPO': '冒聼聫聸茂赂聫', '茫聝卢茫聜陇茫聜垄茫聜娄茫聝聢茫聝禄茅聟聧莽陆庐氓聸鲁': '冒聼聯聫',

};

const CATEGORY_CLASSES = {

};

async function fetchData() {
  const resp = await fetch(SUPABASE_URL + '/rest/v1/pamphlets?select=*&order=title', {
    headers: { 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + ANON_KEY }
  });
  allData = await resp.json();
  document.getElementById('headerCount').textContent = allData.length + '盲禄露茫聛庐茫聝聭茫聝鲁茫聝聲茫聝卢茫聝聝茫聝聢';
  buildSidebar();
  render();
}

function buildSidebar() {
  var cats = {};
  allData.forEach(function(r) { cats[r.category] = (cats[r.category] || 0) + 1; });
  var sorted = Object.entries(cats).sort(function(a, b) { return b[1] - a[1]; });
  var html = '<div class="sidebar-title">茫聜芦茫聝聠茫聜麓茫聝陋</div>';
  html += '<div class="sidebar-item ' + (!currentCategory ? 'active' : '') + '" onclick="selectCategory(null)"><span class="sidebar-icon">冒聼聯聛</span>茫聛聶茫聛鹿茫聛娄<span class="sidebar-count">' + allData.length + '</span></div>';
  sorted.forEach(function(entry) {
    var cat = entry[0], count = entry[1];
    var icon = CATEGORY_ICONS[cat] || '冒聼聯聛';
    var active = currentCategory === cat ? 'active' : '';
    html += '<div class="sidebar-item ' + active + '" onclick="selectCategory(\'' + cat.replace(/'/g, "\\\'" ) + '\')"><span class="sidebar-icon">' + icon + '</span>' + esc(cat) + '<span class="sidebar-count">' + count + '</span></div>';
  });
  document.getElementById('sidebar').innerHTML = html;
}

function selectCategory(cat) {
  currentCategory = cat;
  currentManufacturer = null;
  buildSidebar();
  render();
}

function getFiltered() {
  var data = allData.slice();
  if (currentCategory) data = data.filter(function(r) { return r.category === currentCategory; });
  if (currentManufacturer) data = data.filter(function(r) { return r.manufacturer === currentManufacturer; });
  if (searchQuery) {
    var q = searchQuery.toLowerCase();
    data = data.filter(function(r) {
      return (r.title && r.title.toLowerCase().indexOf(q) >= 0) ||
        (r.filename && r.filename.toLowerCase().indexOf(q) >= 0) ||
        (r.manufacturer && r.manufacturer.toLowerCase().indexOf(q) >= 0) ||
        (r.tags && r.tags.some(function(t) { return t.toLowerCase().indexOf(q) >= 0; }));
    });
  }
  if (sortBy === 'title') data.sort(function(a, b) { return (a.title || '').localeCompare(b.title || '', 'ja'); });
  else if (sortBy === 'size_desc') data.sort(function(a, b) { return (b.file_size || 0) - (a.file_size || 0); });
  else if (sortBy === 'size_asc') data.sort(function(a, b) { return (a.file_size || 0) - (b.file_size || 0); });
  else if (sortBy === 'manufacturer') data.sort(function(a, b) { return (a.manufacturer || 'zzz').localeCompare(b.manufacturer || 'zzz', 'ja'); });
  return data;
}

function render() {
  var data = getFiltered();
  var title = currentCategory || '茫聛聶茫聛鹿茫聛娄茫聛庐茫聝聭茫聝鲁茫聝聲茫聝卢茫聝聝茫聝聢';
  var icon = currentCategory ? (CATEGORY_ICONS[currentCategory] || '冒聼聯聛') : '冒聼聯聛';
  document.getElementById('mainTitle').textContent = icon + ' ' + title;
  document.getElementById('mainCount').textContent = data.length + '盲禄露' + (searchQuery ? ' (忙陇聹莽麓垄: "' + searchQuery + '")' : '');

  // Toolbar
  var toolHtml = '';
  var mfrs = {};
  var base = currentCategory ? allData.filter(function(r) { return r.category === currentCategory; }) : allData;
  base.forEach(function(r) { if (r.manufacturer) mfrs[r.manufacturer] = (mfrs[r.manufacturer] || 0) + 1; });
  if (Object.keys(mfrs).length > 0) {
    toolHtml += '<span class="toolbar-label">茫聝隆茫聝录茫聜芦茫聝录:</span>';
    toolHtml += '<button class="btn-filter ' + (!currentManufacturer ? 'active' : '') + '" onclick="filterMfr(null)">茫聛聶茫聛鹿茫聛娄</button>';
    Object.entries(mfrs).sort(function(a, b) { return b[1] - a[1]; }).forEach(function(entry) {
      var mfr = entry[0];
      var active = currentManufacturer === mfr ? 'active' : '';
      toolHtml += '<button class="btn-filter ' + active + '" onclick="filterMfr(\'' + mfr.replace(/'/g, "\\\'" ) + '\')">' + esc(mfr) + '</button>';
    });
  }
  toolHtml += '<select class="sort-select" onchange="changeSort(this.value)">';
  toolHtml += '<option value="title"' + (sortBy==='title'?' selected':'') + '>茫聜驴茫聜陇茫聝聢茫聝芦茅聽聠</option>';
  toolHtml += '<option value="size_desc"' + (sortBy==='size_desc'?' selected':'') + '>茫聜碌茫聜陇茫聜潞 (氓陇搂芒聠聮氓掳聫)</option>';
  toolHtml += '<option value="size_asc"' + (sortBy==='size_asc'?' selected':'') + '>茫聜碌茫聜陇茫聜潞 (氓掳聫芒聠聮氓陇搂)</option>';
  toolHtml += '<option value="manufacturer"' + (sortBy==='manufacturer'?' selected':'') + '>茫聝隆茫聝录茫聜芦茫聝录茅聽聠</option>';
  toolHtml += '</select>';
  document.getElementById('toolbar').innerHTML = toolHtml;

  if (data.length === 0) {
    document.getElementById('content').innerHTML = '<div class="empty-state"><p>猫漏虏氓陆聯茫聛聶茫聜聥茫聝聭茫聝鲁茫聝聲茫聝卢茫聝聝茫聝聢茫聛聦猫娄聥茫聛陇茫聛聥茫聜聤茫聛戮茫聛聸茫聜聯茫聛搂茫聛聴茫聛聼</p></div>';
    return;
  }

  if (viewMode === 'table') {
    renderTable(data);
  } else {
    renderCards(data);
  }
}

function renderTable(data) {
  var html = '<div class="table-container"><table><thead><tr>';
  html += '<th style="width:44px;text-align:center">#</th>';
  html += '<th>茫聜驴茫聜陇茫聝聢茫聝芦 <span class="sort-icon">芒聳录</span></th>';
  html += '<th>茫聜芦茫聝聠茫聜麓茫聝陋</th>';
  html += '<th>茫聝隆茫聝录茫聜芦茫聝录 <span class="sort-icon">芒聳录</span></th>';
  html += '<th>茫聜驴茫聜掳</th>';
  html += '<th>茫聜碌茫聜陇茫聜潞 <span class="sort-icon">芒聳录</span></th>';
  html += '<th style="width:56px">PDF</th>';
  html += '</tr></thead><tbody>';
  data.forEach(function(r, i) {
    var catClass = CATEGORY_CLASSES[r.category] || 'cat-default';
    var tags = (r.tags || []).map(function(t) { return '<span class="cell-tag">' + esc(t) + '</span>'; }).join('');
    html += '<tr>';
    html += '<td class="cell-no">' + (i + 1) + '</td>';
    html += '<td><span class="cell-title" onclick="openPdf(\'' + escAttr(r.storage_url) + '\',\'' + escAttr(r.title) + '\')">' + esc(r.title) + '</span></td>';
    html += '<td><span class="cell-category ' + catClass + '">' + esc(r.category) + '</span></td>';
    html += '<td class="cell-mfr">' + (r.manufacturer ? esc(r.manufacturer) : '芒聙聯') + '</td>';
    html += '<td>' + tags + '</td>';
    html += '<td class="cell-size">' + formatSize(r.file_size) + '</td>';
    html += '<td><span class="cell-pdf" onclick="openPdf(\'' + escAttr(r.storage_url) + '\',\'' + escAttr(r.title) + '\')">冒聼聯聞 茅聳聥茫聛聫</span></td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  document.getElementById('content').innerHTML = html;
}

function renderCards(data) {
  var html = '<div class="cards">';
  data.forEach(function(r) {
    var size = formatSize(r.file_size);
    var mfr = r.manufacturer ? '<span class="card-mfr">' + esc(r.manufacturer) + '</span>' : '';
    var tags = (r.tags || []).map(function(t) { return '<span class="card-tag">' + esc(t) + '</span>'; }).join('');
    var catTag = '<span class="card-tag">' + esc(r.category) + '</span>';
    html += '<div class="card" onclick="openPdf(\'' + escAttr(r.storage_url) + '\',\'' + escAttr(r.title) + '\')">';
    html += '<div class="card-title">' + esc(r.title) + '</div>';
    html += '<div class="card-meta">' + catTag + mfr + tags + '</div>';
    html += '<div class="card-info"><span>冒聼聯聞 ' + size + '</span><span>冒聼聰聭 ' + esc(r.storage_key) + '</span></div>';
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function setView(mode) {
  viewMode = mode;
  document.getElementById('btnCard').className = 'btn-toggle' + (mode === 'card' ? ' active' : '');
  document.getElementById('btnTable').className = 'btn-toggle' + (mode === 'table' ? ' active' : '');
  render();
}

function filterMfr(mfr) { currentManufacturer = mfr; render(); }
function changeSort(val) { sortBy = val; render(); }
function handleSearch() { searchQuery = document.getElementById('searchInput').value.trim(); render(); }

function openPdf(url, title) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('pdfFrame').src = url;
  document.getElementById('modalDownload').href = url;
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('active');
  document.getElementById('pdfFrame').src = '';
  document.getElementById('translatePanel').style.display = 'none';
  document.getElementById('pdfFrame').style.display = '';
  document.getElementById('modalTranslate').textContent = 'Google莽驴禄猫篓鲁茫聛搂茅聳聥茫聛聫';
  document.body.style.overflow = '';
}

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

async function translatePdf() {
  var panel = document.getElementById('translatePanel');
  var frame = document.getElementById('pdfFrame');
  var btn = document.getElementById('modalTranslate');
  if (panel.style.display === 'block') {
    panel.style.display = 'none';
    frame.style.display = '';
    btn.textContent = 'Google莽驴禄猫篓鲁茫聛搂茅聳聥茫聛聫';
    return;
  }
  panel.style.display = 'block';
  frame.style.display = 'none';
  btn.textContent = '氓聨聼忙聳聡PDF茫聛芦忙聢禄茫聛聶';
  panel.innerHTML = '<div class="tp-progress"><div class="spinner"></div><br>PDF茫聛聥茫聜聣茫聝聠茫聜颅茫聜鹿茫聝聢茫聜聮忙聤陆氓聡潞盲赂颅...</div>';
  try {
    var url = document.getElementById('modalDownload').href;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    var pdf = await pdfjsLib.getDocument(url).promise;
    var pages = [];
    for (var i = 1; i <= pdf.numPages; i++) {
      panel.querySelector('.tp-progress').innerHTML = '<div class="spinner"></div><br>茫聝聠茫聜颅茫聜鹿茫聝聢忙聤陆氓聡潞盲赂颅... (' + i + '/' + pdf.numPages + '茫聝職茫聝录茫聜赂)';
      var pg = await pdf.getPage(i);
      var tc = await pg.getTextContent();
      var t = tc.items.map(function(x){return x.str;}).join(' ').trim();
      if (t) pages.push({num:i, text:t});
    }
    if (pages.length === 0) {
      panel.innerHTML = '<div class="tp-progress">茫聝聠茫聜颅茫聜鹿茫聝聢茫聛聦猫娄聥茫聛陇茫聛聥茫聜聤茫聛戮茫聛聸茫聜聯茫聛搂茫聛聴茫聛聼茫聙聜茫聛聯茫聛庐PDF茫聛炉莽聰禄氓聝聫茫聝聶茫聝录茫聜鹿茫聛庐氓聫炉猫聝陆忙聙搂茫聛聦茫聛聜茫聜聤茫聛戮茫聛聶茫聙聜</div>';
      return;
    }
    var html = '';
    for (var j = 0; j < pages.length; j++) {
      panel.innerHTML = '<div class="tp-progress"><div class="spinner"></div><br>莽驴禄猫篓鲁盲赂颅... (' + (j+1) + '/' + pages.length + '茫聝職茫聝录茫聜赂)</div>' + html;
      var chunks = [];
      var src = pages[j].text;
      while (src.length > 0) { chunks.push(src.substring(0, 4500)); src = src.substring(4500); }
      var translated = '';
      for (var k = 0; k < chunks.length; k++) {
        var r = await fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ja&dt=t&q=' + encodeURIComponent(chunks[k]));
        var d = await r.json();
        for (var m = 0; m < d[0].length; m++) { if(d[0][m][0]) translated += d[0][m][0]; }
      }
      html += '<div class="tp-page"><div class="tp-num">芒聙聰 茫聝職茫聝录茫聜赂 ' + pages[j].num + ' 芒聙聰</div><div class="tp-text">' + esc(translated) + '</div></div>';
    }
    panel.innerHTML = html;
  } catch(e) {
    panel.innerHTML = '<div class="tp-progress">莽驴禄猫篓鲁茫聜篓茫聝漏茫聝录: ' + esc(String(e.message || e)) + '</div>';
  }
}

function exportExcel() {
  var data = getFiltered();
  var rows = data.map(function(r, i) {
    return {
      '#': i + 1,
      '茫聜驴茫聜陇茫聝聢茫聝芦': r.title || '',
      '茫聜芦茫聝聠茫聜麓茫聝陋': r.category || '',
      '茫聝隆茫聝录茫聜芦茫聝录': r.manufacturer || '',
      '茫聜驴茫聜掳': (r.tags || []).join(', '),
      '茫聝聲茫聜隆茫聜陇茫聝芦茫聜碌茫聜陇茫聜潞': formatSize(r.file_size),
      '茫聝聲茫聜隆茫聜陇茫聝芦氓聬聧': r.filename || '',
      'PDF URL': r.storage_url || ''
    };
  });
  var ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:5},{wch:50},{wch:20},{wch:15},{wch:20},{wch:12},{wch:40},{wch:60}];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '茫聝聭茫聝鲁茫聝聲茫聝卢茫聝聝茫聝聢盲赂聙猫娄搂');
  var catName = currentCategory || '茫聛聶茫聛鹿茫聛娄';
  XLSX.writeFile(wb, '茫聝聭茫聝鲁茫聝聲茫聝卢茫聝聝茫聝聢DB_' + catName + '.xlsx');
}

function formatSize(bytes) {
  if (!bytes) return '盲赂聧忙聵聨';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function escAttr(s) {
  if (!s) return '';
  return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');
}

fetchData();
